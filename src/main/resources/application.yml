server:
  port: 8080
  servlet:
    context-path: /v1
  tomcat:
    relaxed-query-chars: "{,},\\,|,^,[,],<,>"
    relaxed-path-chars: "{,},\\,|,^,[,],<,>"
springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /v1/api-docs

environments:
  elastic:
    elasticPWD: "${ELASTIC_PASSWORD:14311982}"
    host: "${ES_HOST:localhost}"
    port: "${ES_PORT:9200}"
    protocol: "${ES_PROTOCOL:https}"
spring:
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterAccess=24h
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3.1:8b
        options:
          temperature: 0.0
          num_predict: 32 # Limita a resposta para ser curta e rápida
          num_ctx: 1024   # Reduz consumo de memória

